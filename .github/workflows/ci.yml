name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: Linux
    uses: ./.github/workflows/linux-tests.yml
    with:
      run_asan: true

  windows-validate:
    name: Windows Validate (Build + Package + Gate)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"

      - name: Setup vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/vcpkg/archives
          key: vcpkg-archives-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            vcpkg-archives-

      - name: Configure (Visual Studio + vcpkg)
        shell: pwsh
        run: >
          cmake -S . -B build-win
          -G "Visual Studio 17 2022"
          -A x64
          -DCMAKE_TOOLCHAIN_FILE="$env:GITHUB_WORKSPACE\vcpkg\scripts\buildsystems\vcpkg.cmake"

      - name: Build (RelWithDebInfo)
        shell: pwsh
        run: cmake --build build-win --config RelWithDebInfo

      - name: Build WinUI shell
        shell: cmd
        run: scripts\build-winui.cmd

      - name: Package release zip (no PDB)
        shell: pwsh
        run: |
          python scripts/package.py --build-dir build-win --out dist/Tullius_ctd_loger.zip --no-pdb

      - name: Run release hard gate
        shell: bash
        run: bash scripts/verify_release_gate.sh "$PWD" "$PWD"

      - name: WinUI headless interop smoke
        shell: pwsh
        run: |
          $exe = Join-Path $env:GITHUB_WORKSPACE "build-winui\SkyrimDiagDumpToolWinUI.exe"
          if (-not (Test-Path $exe)) {
            throw "WinUI executable not found: $exe"
          }

          $missingDump = Join-Path $env:GITHUB_WORKSPACE "dist\does-not-exist.dmp"
          $smokeOutDir = Join-Path $env:GITHUB_WORKSPACE "dist\headless-smoke"
          New-Item -ItemType Directory -Path $smokeOutDir -Force | Out-Null

          $psi = [System.Diagnostics.ProcessStartInfo]::new()
          $psi.FileName = $exe
          $psi.WorkingDirectory = $env:GITHUB_WORKSPACE
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $null = $psi.ArgumentList.Add("--headless")
          $null = $psi.ArgumentList.Add("--no-online-symbols")
          $null = $psi.ArgumentList.Add("--out-dir")
          $null = $psi.ArgumentList.Add($smokeOutDir)
          $null = $psi.ArgumentList.Add($missingDump)

          $proc = [System.Diagnostics.Process]::Start($psi)
          if ($null -eq $proc) {
            throw "Failed to start WinUI headless smoke process"
          }

          $stdoutTask = $proc.StandardOutput.ReadToEndAsync()
          $stderrTask = $proc.StandardError.ReadToEndAsync()
          if (-not $proc.WaitForExit(30000)) {
            try {
              $proc.Kill($true)
            } catch {
            }
            $proc.WaitForExit()
            $stdout = $stdoutTask.GetAwaiter().GetResult().Trim()
            $stderr = $stderrTask.GetAwaiter().GetResult().Trim()
            $startupLog = Join-Path $env:GITHUB_WORKSPACE "build-winui\\SkyrimDiagDumpToolWinUI_startup_error.log"
            $bootstrapLog = Join-Path $env:GITHUB_WORKSPACE "build-winui\\SkyrimDiagDumpToolWinUI_headless_bootstrap.log"
            if (Test-Path $startupLog) {
              Write-Host "=== WinUI startup log ==="
              Get-Content $startupLog
            }
            if (Test-Path $bootstrapLog) {
              Write-Host "=== WinUI headless bootstrap log ==="
              Get-Content $bootstrapLog
            }
            throw "WinUI headless smoke timed out after 30 seconds. stdout=[$stdout] stderr=[$stderr]"
          }
          $stdout = $stdoutTask.GetAwaiter().GetResult().Trim()
          $stderr = $stderrTask.GetAwaiter().GetResult().Trim()
          $code = $proc.ExitCode
          if ($code -ne 2) {
            $startupLog = Join-Path $env:GITHUB_WORKSPACE "build-winui\\SkyrimDiagDumpToolWinUI_startup_error.log"
            $bootstrapLog = Join-Path $env:GITHUB_WORKSPACE "build-winui\\SkyrimDiagDumpToolWinUI_headless_bootstrap.log"
            if (Test-Path $startupLog) {
              Write-Host "=== WinUI startup log ==="
              Get-Content $startupLog
            }
            if (Test-Path $bootstrapLog) {
              Write-Host "=== WinUI headless bootstrap log ==="
              Get-Content $bootstrapLog
            }
            throw "Headless smoke expected exit code 2 for missing dump, got $code. stdout=[$stdout] stderr=[$stderr]"
          }

      - name: Upload zip artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: tullius-ctd-logger-windows-zip
          path: |
            dist/Tullius_ctd_loger.zip
          if-no-files-found: error
